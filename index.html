<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horario Semanal · Natalia UNAD VIEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --unad-blue:   #005883;
      --unad-orange: #F47920;
      --unad-yellow: #F0B429;
      --bg:      #EFF3F7;
      --surface: #ffffff;
      --text:    #1A2942;
      --muted:   #64748B;
      --border:  #DDE4EE;
      --radius:  12px;
      --shadow:  0 4px 24px rgba(0,88,131,.10);
      --shadowL: 0 12px 48px rgba(0,88,131,.20);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
 
    /* ─ HEADER ─ */
    .hdr{
      background:linear-gradient(135deg,var(--unad-blue) 0%,#003D5C 100%);
      padding:14px 36px;
      display:flex;align-items:center;gap:20px;
      box-shadow:0 4px 20px rgba(0,0,0,.22);
    }
    .hdr-logo{
      background:#fff;border-radius:10px;padding:5px 9px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.15);
    }
    .hdr-logo img{height:60px;width:auto;display:block}
    .hdr-info{flex:1}
    .hdr-info h1{
      font-family:'Josefin Sans',sans-serif;color:#fff;
      font-size:21px;font-weight:700;letter-spacing:.4px
    }
    .hdr-info p{color:var(--unad-yellow);font-size:12px;font-weight:300;margin-top:3px;letter-spacing:.4px}
    .hdr-tip{
      background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);
      color:rgba(255,255,255,.82);font-size:11.5px;padding:7px 15px;
      border-radius:20px;white-space:nowrap
    }
 
    /* ─ BODY ─ */
    .wrap{padding:28px 36px 48px;max-width:1480px;margin:0 auto}
 
    /* ─ TABLE ─ */
    .tbl-wrap{
      background:var(--surface);border-radius:var(--radius);
      box-shadow:var(--shadow);overflow:hidden;overflow-x:auto
    }
    table{width:100%;border-collapse:collapse;min-width:820px}
 
    thead tr{background:linear-gradient(135deg,var(--unad-blue) 0%,#003D5C 100%)}
    thead th{
      font-family:'Josefin Sans',sans-serif;font-size:11.5px;font-weight:600;
      letter-spacing:1.4px;text-transform:uppercase;color:#fff;
      padding:13px 14px;text-align:center
    }
    thead th:first-child{color:rgba(255,255,255,.55);width:68px;min-width:68px}
 
    /* time col */
    .tc{
      font-family:'Josefin Sans',sans-serif;font-size:11.5px;color:var(--muted);
      text-align:center;padding:0 8px;background:#F7FAFD;
      border-right:2px solid var(--border);border-bottom:1px solid var(--border);
      white-space:nowrap;vertical-align:middle
    }
 
    /* activity cell */
    .ac{
      border-bottom:1px solid rgba(255,255,255,.14);
      border-right:1px solid rgba(255,255,255,.14);
      cursor:pointer;vertical-align:middle;position:relative;
      transition:filter .15s,transform .10s;padding:0;min-width:120px
    }
    .ac:hover{filter:brightness(1.13)}
    .ac:active{transform:scale(.98)}
    .ac-in{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:9px 8px;gap:4px;
      height:100%;min-height:42px
    }
    .ac-lbl{
      font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:700;
      letter-spacing:1.2px;text-transform:uppercase;text-align:center;
      color:#fff;line-height:1.2
    }
    .ac-sub{
      font-family:'Figtree',sans-serif;font-size:9px;font-weight:500;
      color:rgba(255,255,255,.80);letter-spacing:.3px;text-align:center;margin-top:1px
    }
    .ac-dot{
      width:5px;height:5px;border-radius:50%;
      background:rgba(255,255,255,.45);margin-top:1px
    }
    .ac:hover .ac-dot{background:rgba(255,255,255,.9)}
    .ac::after{
      content:'Ver actividades →';position:absolute;bottom:5px;right:6px;
      font-size:8.5px;color:rgba(255,255,255,.50);opacity:0;
      transition:opacity .15s;font-family:'Figtree',sans-serif
    }
    .ac:hover::after{opacity:1}
 
    /* empty */
    .ec{background:#F8FAFD;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
 
    /* lunch */
    .lr td{
      background:linear-gradient(90deg,#FFF7ED,#FEFCE8,#FFF7ED);
      text-align:center;padding:9px;
      border-top:2px solid var(--unad-orange);
      border-bottom:2px solid var(--unad-orange)
    }
    .ll{
      font-family:'Josefin Sans',sans-serif;font-size:10.5px;
      letter-spacing:2px;text-transform:uppercase;
      color:var(--unad-orange);font-weight:700
    }
 
    /* ─ LEGEND ─ */
    .lgd{margin-top:24px}
    .lgd-ttl{
      font-family:'Josefin Sans',sans-serif;font-size:10px;
      letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px
    }
    .lgd-grid{display:flex;flex-wrap:wrap;gap:9px}
    .lgd-item{
      display:flex;align-items:center;gap:8px;
      background:var(--surface);border-radius:8px;
      padding:7px 13px 7px 9px;
      box-shadow:0 1px 5px rgba(0,0,0,.07);cursor:pointer;
      transition:box-shadow .15s
    }
    .lgd-item:hover{box-shadow:0 4px 14px rgba(0,0,0,.12)}
    .lgd-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0}
    .lgd-txt{font-family:'Josefin Sans',sans-serif;font-size:10.5px;font-weight:600;color:var(--text)}
    .lgd-area{font-size:9.5px;color:var(--muted)}
 
    /* ─ MODAL ─ */
    .ovl{
      position:fixed;inset:0;background:rgba(0,25,55,.52);
      backdrop-filter:blur(4px);
      display:flex;align-items:center;justify-content:center;
      z-index:1000;opacity:0;pointer-events:none;transition:opacity .20s
    }
    .ovl.open{opacity:1;pointer-events:all}
    .mc{
      background:var(--surface);border-radius:16px;box-shadow:var(--shadowL);
      width:560px;max-width:96vw;max-height:85vh;
      overflow:hidden;display:flex;flex-direction:column;
      transform:translateY(18px) scale(.97);transition:transform .22s
    }
    .ovl.open .mc{transform:translateY(0) scale(1)}
    .mhdr{
      padding:20px 22px 16px;
      display:flex;align-items:flex-start;justify-content:space-between;
      border-bottom:1px solid var(--border)
    }
    .mhl{display:flex;align-items:flex-start;gap:13px}
    .mbar{width:5px;align-self:stretch;border-radius:4px;flex-shrink:0}
    .mname{font-family:'Josefin Sans',sans-serif;font-size:17px;font-weight:700;color:var(--text);line-height:1.2}
    .mbadge{
      display:inline-block;margin-top:4px;font-size:10.5px;
      color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:10px
    }
    .mclose{
      background:none;border:none;cursor:pointer;font-size:20px;
      color:var(--muted);padding:2px 4px;border-radius:5px;
      transition:background .12s,color .12s
    }
    .mclose:hover{background:var(--bg);color:var(--text)}
    .mbody{padding:18px 22px 22px;overflow-y:auto;flex:1}
    .mproj{margin-bottom:18px}
    .mproj:last-child{margin-bottom:0}
    .mptit{
      font-family:'Josefin Sans',sans-serif;font-size:10.5px;font-weight:700;
      letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);
      margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border)
    }
    .mlist{list-style:none;display:flex;flex-direction:column;gap:6px}
    .mlist li{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--text);line-height:1.4}
    .mbul{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
    .mbody::-webkit-scrollbar{width:5px}
    .mbody::-webkit-scrollbar-track{background:var(--bg)}
    .mbody::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
 
    @media(max-width:680px){
      .hdr{padding:14px;flex-wrap:wrap}
      .wrap{padding:14px}
    }
  </style>
</head>

// ── GRID  [Lunes, Martes, Miercoles, Jueves, Viernes, Sabado] ─────
const SLOTS = ['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','13:00','13:30','14:00','14:30','15:00','15:30','16:00'];
const PRE_LUNCH = 8; // last pre-lunch index
const POST_LUNCH = 9; // first post-lunch index
 
const GRID = [
  // 08:00
  ['FOROS','INNCUNAD','DIR','CIP','WEBCF','IDVIS'],
  // 08:30
  ['FOROS','INNCUNAD','DIR','CIP','WEBCF','IDVIS'],
  // 09:00
  ['FOROS','INNCUNAD','DIR','CIP','FORTRED','IDVIS'],
  // 09:30
  ['CIPAS','INNCUNAD','DIR','CIP','FORTRED','BOL'],
  // 10:00
  ['CIPAS','INNCUNAD','ATECUSO','CIP','FORTRED','BOL'],
  // 10:30
  ['INV_ACT','INNCUNAD','ATECUSO','CIP','FORTRED','CIPAS'],
  // 11:00
  ['INV_ACT','INNCUNAD','ATECEAD','CIP','ATECEAD','CIPAS'],
  // 11:30
  ['INV_ACT','INNCUNAD','ATECEAD','CIP','ATECEAD','CIPAS'],
  // 12:00
  ['INV_ACT','INNCUNAD','ATECEAD','CIP','ATECEAD','CIPAS'],
  // 13:00
  ['INV_ACT','INNCUNAD','ATECEAD','CIP','ATECEAD','PROSPECTA'],
  // 13:30
  ['INV_ACT','INNCUNAD','DIR','CIP','TG','PROSPECTA'],

  ['INV_ACT','INNCUNAD','DIR','CIP','TG','PROSPECTA'],

  ['INV_ARCADE','INNCUNAD','DIR','CIP','TG',null],
  // 15:00
  ['INV_ARCADE','INNCUNAD','DIR','CIP','TG',null],
  // 15:30
  ['INV_ACC','INNCUNAD','DIR','CIP','TG',null],
  // 16:00
  ['INV_ACC','INNCUNAD','DIR','CIP','TG',null],
];
 
const DAYS  = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DAYSS = ['LUN','MAR','MIÉ','JUE','VIE','SÁB'];
 
// ── MERGE CALCULATION ──
function mergeInfo(grid){
  const R=grid.length, C=6;
  const info=Array.from({length:R},()=>Array.from({length:C},()=>({skip:false,rs:1})));
  const segs=[[0,PRE_LUNCH],[POST_LUNCH,R-1]];
  for(let c=0;c<C;c++){
    for(const [s,e] of segs){
      let r=s;
      while(r<=e){
        const a=grid[r][c]; let sp=1;
        while(r+sp<=e&&grid[r+sp][c]===a)sp++;
        info[r][c].rs=sp;
        for(let k=1;k<sp;k++)info[r+k][c].skip=true;
        r+=sp;
      }
    }
  }
  return info;
}
 
function buildTable(){
  const mi=mergeInfo(GRID);
  const tbl=document.getElementById('tbl');
  // thead
  const thead=tbl.createTHead();
  const hr=thead.insertRow();
  const th0=document.createElement('th');th0.textContent='Hora';hr.appendChild(th0);
  DAYS.forEach((d,i)=>{
    const th=document.createElement('th');
    th.innerHTML=`<span style="display:block">${DAYSS[i]}</span><span style="font-weight:300;font-size:9.5px;opacity:.7">${d}</span>`;
    hr.appendChild(th);
  });
  // tbody
  const tb=tbl.createTBody();
  for(let r=0;r<GRID.length;r++){
    if(r===POST_LUNCH){
      const lr=tb.insertRow();lr.className='lr';
      const ltd=document.createElement('td');
      ltd.setAttribute('colspan','7');
      ltd.innerHTML='<span class="ll">☕&nbsp; Almuerzo</span>';
      lr.appendChild(ltd);
    }
    const tr=tb.insertRow();
    const tc=document.createElement('td');tc.className='tc';tc.textContent=SLOTS[r];tr.appendChild(tc);
    for(let c=0;c<6;c++){
      if(mi[r][c].skip)continue;
      const key=GRID[r][c];
      const td=document.createElement('td');
      td.setAttribute('rowspan',mi[r][c].rs);
      if(!key){
        td.className='ec';
      } else {
        const ln=L[key];
        td.className='ac';
        td.style.background=ln.color;
        td.title=ln.label;
        td.addEventListener('click',()=>openModal(key));
        td.innerHTML=`<div class="ac-in"><div class="ac-lbl">${ln.sub}</div><div class="ac-sub">${ln.short}</div></div>`;
      }
      tr.appendChild(td);
    }
  }
}
 
function buildLegend(){
  const g=document.getElementById('lgd');
  // group by sub-area for visual organization
  const order=['ECBTI','VIEM','Investigación'];
  const grouped={};
  Object.entries(L).forEach(([k,v])=>{
    if(!grouped[v.sub])grouped[v.sub]=[];
    grouped[v.sub].push([k,v]);
  });
  order.forEach(area=>{
    if(!grouped[area])return;
    // area header
    const hdr=document.createElement('div');
    hdr.style.cssText='width:100%;font-family:Josefin Sans,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#94A3B8;margin-top:8px;margin-bottom:2px';
    hdr.textContent=area;
    g.appendChild(hdr);
    grouped[area].forEach(([k,v])=>{
      const item=document.createElement('div');
      item.className='lgd-item';
      item.addEventListener('click',()=>openModal(k));
      item.innerHTML=`<div class="lgd-dot" style="background:${v.color}"></div><div><div class="lgd-txt">${v.short}</div><div class="lgd-area">${v.area}</div></div>`;
      g.appendChild(item);
    });
  });
}
 
function openModal(key){
  const ln=L[key];
  document.getElementById('mbar').style.background=ln.color;
  document.getElementById('mname').textContent=ln.label;
  document.getElementById('mbadge').textContent=ln.area;
  const body=document.getElementById('mbody');
  body.innerHTML='';
  ln.projects.forEach(p=>{
    const d=document.createElement('div');d.className='mproj';
    d.innerHTML=`<div class="mptit">${p.name}</div>`;
    const ul=document.createElement('ul');ul.className='mlist';
    p.acts.forEach(a=>{
      const li=document.createElement('li');
      li.innerHTML=`<div class="mbul" style="background:${ln.color}"></div><span>${a}</span>`;
      ul.appendChild(li);
    });
    d.appendChild(ul);body.appendChild(d);
  });
  document.getElementById('ovl').classList.add('open');
}
function closeModal(){document.getElementById('ovl').classList.remove('open')}
 
document.addEventListener('DOMContentLoaded',()=>{
  buildTable();buildLegend();
  document.getElementById('mcls').addEventListener('click',closeModal);
  document.getElementById('ovl').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
});
</script>
